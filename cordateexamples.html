<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Types Of Leaves</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
}

/* Heading */
.page-title{
    text-align:center;
    font-size:30px;
    color:#0d47a1;
    margin-bottom:25px;
    font-weight:bold;
}

/* Card */
.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    margin-bottom:25px;
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-5px);
}

/* Image Container */
.image-box{
    width:100%;
    height:250px;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:10px;
}

.image-box img{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
}
.content{
    padding:18px;
}

.content h2{
    color:#222;
    margin-bottom:10px;
    font-size:22px;
}

.content p{
    color:#555;
    line-height:1.6;
    font-size:15px;
}

/* Link Button */
.link{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#0d6efd;
    color:#fff;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    transition:0.3s;
}

.link:hover{
    background:#084ec2;
}

/* Mobile */
@media (max-width:480px){

.page-title{
    font-size:26px;
}

.image-box{
    height:200px;
}

.content h2{
    font-size:20px;
}

.link{
    font-size:16px;
}
}
</style>

</head>
<body>

<div class="container">

    <h1 class="page-title">Corda Leaves</h1>

    <!-- Card 1 -->
    <div class="card">

        <div class="image-box">
            <img src="https://blog-images-1.pharmeasy.in/blog/production/wp-content/uploads/2022/04/31073622/giloy-benefits.webp" alt="Guduchi">
        </div>

        <div class="content">
            <h2>Guduchi</h2>
            <p><b>Botanical name:</b> Tinospora Cordifolia</p>
            <p><b>Family:</b> Manispermaceae</p>

            
        </div>

    </div>

    <!-- Card 2 -->
    <div class="card">

        <div class="image-box">
            <img src="https://www.athayurdhamah.com/img/Bala.jpg" alt="Bala">
        </div>

        <div class="content">
            <h2>Bala</h2>
            <p><b>Botanical name:</b>Sida cordifolia</p>
            <p><b>Family:</b> Malvaceae</p>

        </div>

    </div>

</div>

</body>
</html>
